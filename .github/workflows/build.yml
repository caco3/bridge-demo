name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Pebble SDK and build
        run: |
          uv tool install pebble-tool
          pebble sdk install 4.9.169 || pebble sdk install latest
          pebble build

      - name: Copy built PBW into docs
        run: |
          mkdir -p docs/build
          cp build/bridge-demo.pbw docs/build/bridge-demo.pbw

      - name: Commit updated PBW
        if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[CI] Update build')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build/bridge-demo.pbw docs/build/bridge-demo.pbw
          if git diff --cached --quiet; then
            echo "No binary changes to commit"
          else
            git commit -m "[CI] Update build"
            git push
          fi

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
